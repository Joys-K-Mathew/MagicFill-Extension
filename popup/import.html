<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Magic Fill — Import Vault</title>
  <style>
    /* Use system fonts instead of Google Fonts CDN for privacy */
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #2a2d4a;
      --text: #e8e8f0;
      --text-light: #9a9ab0;
      --accent: #7c5cfc;
      --accent-hover: #6a4ce0;
      --success: #3ddc84;
      --danger: #ff5c5c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo { font-size: 3rem; margin-bottom: 12px; }
    h1 { font-size: 1.4rem; margin-bottom: 6px; }
    .subtitle { color: var(--text-light); font-size: 0.85rem; margin-bottom: 30px; line-height: 1.5; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 40px 20px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124, 92, 252, 0.05);
    }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .drop-zone p { color: var(--text-light); font-size: 0.85rem; }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .status-box {
      display: none;
      background: rgba(124, 92, 252, 0.08);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .status-box.show { display: block; }
    .status-box.error { background: rgba(255, 92, 92, 0.08); border-color: var(--danger); }
    .status-box.success { background: rgba(61, 220, 132, 0.08); border-color: var(--success); }

    .passphrase-area {
      display: none;
      margin-bottom: 20px;
    }
    .passphrase-area.show { display: block; }
    .passphrase-area label { display: block; font-size: 0.85rem; color: var(--text-light); margin-bottom: 8px; text-align: left; }
    .passphrase-area input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .passphrase-area input:focus { border-color: var(--accent); }

    .conflict-area {
      display: none;
      margin-bottom: 20px;
    }
    .conflict-area.show { display: block; }
    .conflict-area p { font-size: 0.82rem; color: var(--text-light); margin-bottom: 14px; line-height: 1.5; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 8px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: rgba(255,92,92,0.15); color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: rgba(255,92,92,0.25); }
    .btn-success { background: rgba(61,220,132,0.15); color: var(--success); border: 1px solid var(--success); }
    .btn-success:hover { background: rgba(61,220,132,0.25); }
    .btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text-light); }
    .btn-close-tab { background: var(--accent); color: white; margin-top: 12px; }
    .btn-close-tab:hover { background: var(--accent-hover); }

    .file-info {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-bottom: 16px;
    }
    .file-info strong { color: var(--text); }

    .notice-banner {
      background: rgba(124, 92, 252, 0.08);
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 0.78rem;
      color: var(--text-light);
      line-height: 1.6;
      text-align: left;
    }
    .notice-banner strong { color: var(--text); }

    /* Remove scrollbar arrows */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-light);
    }
    ::-webkit-scrollbar-button {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔐</div>
    <h1>Import Vault</h1>
    <p class="subtitle">To ensure your import completes safely without being interrupted by the browser closing the extension popup, we use this dedicated tab.</p>

    <div class="drop-zone" id="drop-zone">
      <div class="icon">📁</div>
      <p>Click to select or drag & drop your <strong>.json</strong> vault file</p>
      <input type="file" id="file-input" accept=".json" />
    </div>

    <div class="file-info" id="file-info"></div>
    <div class="status-box" id="status-box"></div>

    <div class="passphrase-area" id="passphrase-area">
      <label for="passphrase">Enter the passphrase used when this vault was exported:</label>
      <input type="password" id="passphrase" placeholder="Vault passphrase" />
      <br><br>
      <button class="btn btn-primary" id="decrypt-btn">🔓 Decrypt & Import</button>
    </div>

    <div class="conflict-area" id="conflict-area">
      <p id="conflict-msg"></p>
      <button class="btn btn-success" id="conflict-merge">🔀 Merge with existing one</button>
      <button class="btn btn-primary" id="conflict-duplicate">➕ Create a duplicate entry</button>
      <button class="btn btn-ghost" id="conflict-cancel">Cancel the import</button>
    </div>
  </div>

  <script src="../browser-polyfill.js"></script>
  <script src="import.js"></script>
</body>
</html>
